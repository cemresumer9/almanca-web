<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artikel Quiz - Lerne Deutsch</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #e9ecef; padding: 40px; }
        .quiz-container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: inline-block; min-width: 300px; }
        #word-display { font-size: 40px; font-weight: bold; margin-bottom: 30px; color: #2d3436; }
        .options { display: flex; justify-content: center; gap: 15px; }
        .btn { padding: 15px 30px; font-size: 18px; border: none; border-radius: 10px; cursor: pointer; transition: 0.3s; color: white; font-weight: bold; }
        .der { background-color: #0984e3; } /* Mavi */
        .die { background-color: #e84393; } /* Pembe */
        .das { background-color: #00b894; } /* Yeşil */
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }
        #feedback { margin-top: 25px; font-size: 22px; height: 30px; font-weight: bold; }
        .correct { color: #27ae60; }
        .wrong { color: #c0392b; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>Welcher Artikel?</h1>
    <div id="word-display">Wort</div>
    
    <div class="options">
        <button class="btn der" onclick="checkAnswer('Der')">Der</button>
        <button class="btn die" onclick="checkAnswer('Die')">Die</button>
        <button class="btn das" onclick="checkAnswer('Das')">Das</button>
    </div>

    <div id="feedback"></div>
    <button onclick="nextQuestion()" style="margin-top: 20px; cursor: pointer; background: none; border: 1px solid #aaa; padding: 5px 10px; border-radius: 5px;">Nächstes Wort (Sıradaki)</button>
</div>

<script>
    // Soru Havuzu: Buraya istediğin kadar kelime ekleyebiliriz
    const quizData = [
        { word: "Apfel", artikel: "Der" },
        { word: "Tasche", artikel: "Die" },
        { word: "Buch", artikel: "Das" },
        { word: "Tisch", artikel: "Der" },
        { word: "Lampe", artikel: "Die" },
        { word: "Auto", artikel: "Das" }
    ];

    let currentWordIndex = 0;

    function loadQuestion() {
        const display = document.getElementById("word-display");
        const feedback = document.getElementById("feedback");
        feedback.innerHTML = ""; // Geri bildirimi temizle
        
        // Rastgele bir kelime seç
        currentWordIndex = Math.floor(Math.random() * quizData.length);
        display.innerHTML = quizData[currentWordIndex].word;
    }

    function checkAnswer(userChoice) {
        const feedback = document.getElementById("feedback");
        const correctAnswer = quizData[currentWordIndex].artikel;

        if (userChoice === correctAnswer) {
            feedback.innerHTML = "Richtig! ✅ (" + correctAnswer + ")";
            feedback.className = "correct";
            // 1.5 saniye sonra otomatik yeni soruya geç
            setTimeout(loadQuestion, 1500);
        } else {
            feedback.innerHTML = "Falsch! ❌ Es ist " + correctAnswer;
            feedback.className = "wrong";
        }
    }

    // İlk soruyu yükle
    loadQuestion();
</script>

</body>
</html>
