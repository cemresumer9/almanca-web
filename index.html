<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Artikel Quiz</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f4f4; }
        .box { background: white; padding: 30px; border-radius: 10px; display: inline-block; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .word { font-size: 32px; margin-bottom: 20px; font-weight: bold; }
        button { padding: 10px 20px; margin: 5px; font-size: 18px; cursor: pointer; border: none; border-radius: 5px; color: white; }
        .der { background: #007bff; }
        .die { background: #e83e8c; }
        .das { background: #28a745; }
        #msg { margin-top: 20px; font-size: 20px; min-height: 24px; }
    </style>
</head>
<body>

<div class="box">
    <h1>Welcher Artikel?</h1>
    <div id="targetWord" class="word">Laden...</div>
    
    <button class="der" onclick="check('Der')">Der</button>
    <button class="die" onclick="check('Die')">Die</button>
    <button class="das" onclick="check('Das')">Das</button>

    <div id="msg"></div>
    <br>
    <button onclick="next()" style="background: #6c757d;">Nächstes Wort (Yeni Kelime)</button>
</div>

<script>
    const list = [
        { w: "Tisch", a: "Der" },
        { w: "Tür", a: "Die" },
        { w: "Fenster", a: "Das" },
        { w: "Stuhl", a: "Der" },
        { w: "Zeitung", a: "Die" },
        { w: "Auto", a: "Das" }
    ];

    let current;

    function next() {
        document.getElementById("msg").innerHTML = "";
        current = list[Math.floor(Math.random() * list.length)];
        document.getElementById("targetWord").innerHTML = current.w;
    }

    function check(choice) {
        const msg = document.getElementById("msg");
        if (choice === current.a) {
            msg.innerHTML = "Richtig! ✅";
            msg.style.color = "green";
        } else {
            msg.innerHTML = "Falsch! ❌ Es ist " + current.a;
            msg.style.color = "red";
        }
    }

    // Sayfa açıldığında ilk kelimeyi getir
    next();
</script>

</body>
</html>
